<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container{
            width:350px;
            margin:80px auto;
            padding:20px;
            background:white;
            border:2px solid black;
            border-radius:10px;
        }

        h2{
            text-align:center;
        }

        label{
            font-weight:bold;
        }

        input{
            width:95%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:70px;
            padding:10px;
            margin:5px;
            font-size:16px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
            color:blue;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Arithmetic Calculator</h2>

<label>Enter Number 1</label><br>
<input type="number" id="num1"><br>

<label>Enter Number 2</label><br>
<input type="number" id="num2"><br>

<button onclick="add()">+</button>
<button onclick="subtract()">-</button>
<button onclick="multiply()">*</button>
<button onclick="divide()">/</button>

<h3 id="result">Result :</h3>

</div>

<script>

function add()
{
    var a = Number(document.getElementById("num1").value);
    var b = Number(document.getElementById("num2").value);

    document.getElementById("result").innerHTML = "Result : " + (a + b);
}

function subtract()
{
    var a = Number(document.getElementById("num1").value);
    var b = Number(document.getElementById("num2").value);

    document.getElementById("result").innerHTML = "Result : " + (a - b);
}

function multiply()
{
    var a = Number(document.getElementById("num1").value);
    var b = Number(document.getElementById("num2").value);

    document.getElementById("result").innerHTML = "Result : " + (a * b);
}

function divide()
{
    var a = Number(document.getElementById("num1").value);
    var b = Number(document.getElementById("num2").value);

    if(b == 0)
    {
        document.getElementById("result").innerHTML = "Cannot divide by zero";
    }
    else
    {
        document.getElementById("result").innerHTML = "Result : " + (a / b);
    }
}

</script>

</body>
</html>
